<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Template Builder</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="app" data-mobile-view="chat">
    <h1 class="sr-only">Interview Template Builder</h1>

    <nav class="mobile-tabs" aria-label="Switch panel">
      <button type="button" class="mobile-tab" data-view="chat" aria-pressed="true"
        onclick="setMobileView('chat')">Chat</button>
      <button type="button" class="mobile-tab" data-view="template" aria-pressed="false"
        onclick="setMobileView('template')">Template</button>
    </nav>

    <section class="panel chat-panel" aria-label="AI assistant">
      <div class="panel-header">AI Assistant</div>
      <div class="messages" id="messages" role="log" aria-live="polite"></div>
      <div class="chat-input">
        <div class="quick-actions-row">
          <button class="quick-action-btn" onclick="sendQuickAction('Can you suggest another topic we haven\'t covered yet?')">+ Suggest a topic</button>
          <button class="quick-action-btn" onclick="sendQuickAction('Can you review the pacing instructions and tighten them up — make them more concise and actionable?')">⚡ Tighten pacing</button>
          <button class="quick-action-btn" onclick="sendQuickAction('Can you suggest some additional expansion topics based on what we\'ve built so far?')">↗ Add expansion ideas</button>
        </div>
        <div class="chat-input-row">
          <textarea id="input" placeholder="Type your response…" rows="2"></textarea>
          <button id="send-btn" onclick="sendMessage()">Send</button>
        </div>
      </div>
    </section>

    <main class="panel template-panel" aria-label="Interview guide template">
      <div class="panel-header">
        <span>Live Template</span>
        <button class="export-btn" onclick="exportTemplate()">Export Template</button>
      </div>
      <div id="settings-strip"></div>
      <div id="template-sections"></div>
    </main>

  </div>

  <div class="modal-overlay hidden" id="modal-overlay" onclick="closeModal()"></div>
  <div class="modal hidden" id="export-modal">
    <div class="modal-header">
      <h2 id="modal-title">Export Template</h2>
      <button class="modal-close" onclick="closeModal()" aria-label="Close">×</button>
    </div>
    <div id="modal-template">
      <pre id="template-output"></pre>
      <button class="download-btn" onclick="downloadTemplate()">Download .txt</button>
    </div>
  </div>

  <script src="/static/duration.js"></script>
  <script src="/static/app.js"></script>
</body>
</html>
